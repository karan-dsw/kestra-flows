id: insurance_router
namespace: company.ops

tasks:
  - id: generate_intent
    type: io.kestra.plugin.core.debug.Return
    format: "grievance" #assuming this intent is coming from the intent agent!
  
  - id: run_python
    type: io.kestra.plugin.scripts.python.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    namespaceFiles:
      enabled: true
    commands:
      - python app.py "{{ outputs.generate_intent.value }}"
